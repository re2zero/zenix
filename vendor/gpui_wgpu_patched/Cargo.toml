[package]
name = "gpui_wgpu"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[lib]
path = "src/gpui_wgpu.rs"

[features]
default = []
font-kit = ["dep:font-kit"]

[dependencies]
gpui = { git = "https://github.com/zed-industries/zed" }
anyhow = "1.0.86"
bytemuck = "1"
cosmic-text = "0.19.0"
etagere = "0.2"
collections = { git = "https://github.com/zed-industries/zed" }
itertools = "0.14.0"
log = { version = "0.4.16", features = ["kv_unstable_serde", "serde"] }
parking_lot = "0.12.1"
profiling = "1"
raw-window-handle = "0.6"
smallvec = "1.6"
swash = "0.2.6"
unicode-segmentation = "1.10"
gpui_util = { git = "https://github.com/zed-industries/zed" }
wgpu = { git = "https://github.com/zed-industries/wgpu.git", rev = "357a0c56e0070480ad9daea5d2eaa83150b79e88" }

font-kit = { git = "https://github.com/zed-industries/font-kit", rev = "94b0f28166665e8fd2f53ff6d268a14955c82269", package = "zed-font-kit", version = "0.14.1-zed", optional = true }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
pollster = "0.4.0"

[target.'cfg(target_family = "wasm")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["HtmlCanvasElement"] }
js-sys = "0.3"
