# CI — quick validation on every push / PR.
#
# Runs:     cargo check + clippy + test on the three tier-1 platforms.
# Does NOT produce release artifacts.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libxcb1-dev                        \
            libxkbcommon-dev                   \
            libxkbcommon-x11-dev               \
            libfontconfig1-dev                 \
            libfreetype6-dev                   \
            libexpat1-dev                      \
            libwayland-dev                     \
            libegl1-mesa-dev                   \
            libgl1-mesa-dev

      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
