# Release workflow — automatic build and publish on version tags.
#
# Trigger:      git push --tags v*
#
# Outputs:
#   OS            Format(s)                                    Job
#   ──────────────────────────────────────────────────────────────────────
#   Windows x86_64  .exe installer (Inno Setup)                windows
#   macOS x86_64    .dmg (app bundle)                          macos-x86_64
#   macOS aarch64   .dmg (app bundle)                          macos-aarch64
#   Linux (any)     .deb + .AppImage (matrix: 3 glibc bases)   linux
#   Linux (any)     .rpm (ubuntu24 glibc baseline)              linux
#   Arch Linux      .pkg.tar.zst                                archlinux

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Windows x86_64  — .exe installer
  # ═══════════════════════════════════════════════════════════════
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "iscc"
          }
          $langDir = "${env:ProgramFiles(x86)}\Inno Setup 6\Languages"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$langDir\ChineseSimplified.isl"
          & $iscc "/DMyAppVersion=$version" installers\windows\zenix.iss

      - uses: actions/upload-artifact@v4
        with:
          name: zenix-windows
          path: zenix-*-x86_64-setup.exe

  # ═══════════════════════════════════════════════════════════════
  #  macOS x86_64 (Intel)  — .dmg
  # ═══════════════════════════════════════════════════════════════
  macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup target add x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-x86_64

      - run: cargo build --release --target x86_64-apple-darwin

      - name: Package (.dmg)
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash installers/macos/package-dmg.sh \
            "${version}" "x86_64" "target/x86_64-apple-darwin/release/"

      - uses: actions/upload-artifact@v4
        with:
          name: zenix-macos-x86_64
          path: zenix-*-x86_64-apple-darwin.dmg

  # ═══════════════════════════════════════════════════════════════
  #  macOS aarch64 (Apple Silicon)  — .dmg
  # ═══════════════════════════════════════════════════════════════
  macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release

      - name: Package (.dmg)
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash installers/macos/package-dmg.sh \
            "${version}" "aarch64" "target/release/"

      - uses: actions/upload-artifact@v4
        with:
          name: zenix-macos-aarch64
          path: zenix-*-aarch64-apple-darwin.dmg

  # ═══════════════════════════════════════════════════════════════
  #  Linux  — .deb + .AppImage + .rpm (matrix: 3 glibc baselines)
  # ═══════════════════════════════════════════════════════════════
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:20.04
            suffix: ubuntu20
          - image: ubuntu:22.04
            suffix: ubuntu22
          - image: ubuntu:24.04
            suffix: ubuntu24
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build inside ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            ${{ matrix.image }} \
            bash -e -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq || {
                sed -i "s|archive.ubuntu.com|old-releases.ubuntu.com|g" /etc/apt/sources.list
                sed -i "s|security.ubuntu.com|old-releases.ubuntu.com|g" /etc/apt/sources.list
                apt-get update -qq
              }
              apt-get install -y -qq --no-install-recommends \
                ca-certificates curl pkg-config make gcc g++ xz-utils \
                libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev \
                libfontconfig1-dev libfreetype6-dev libexpat1-dev \
                libwayland-dev libegl1-mesa-dev libgl1-mesa-dev

              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"

              curl -L https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz \
                | tar -xJ -C /usr/local
              ln -s /usr/local/zig-x86_64-linux-0.15.2/zig /usr/local/bin/zig

              cargo build --release
              cd herdr && cargo build --release && cd ..
              cp herdr/target/release/herdr target/release/ 2>/dev/null || true
            '

      - name: Package (.deb)
        run: |
          version="${GITHUB_REF_NAME#v}"
          suffix="${{ matrix.suffix }}"
          BINDIR="target/release"

          D="zenix-deb/zenix_${version}_${suffix}_amd64"
          mkdir -p "${D}/DEBIAN" "${D}/usr/bin" "${D}/usr/share/applications" \
                   "${D}/usr/share/icons/hicolor/512x512/apps" \
                   "${D}/usr/share/doc/zenix" \
                   "${D}/usr/share/zenix/fonts" "${D}/usr/share/zenix/themes"

          cp "${BINDIR}/zenix" "${D}/usr/bin/"
          test -f "${BINDIR}/herdr" && cp "${BINDIR}/herdr" "${D}/usr/share/zenix/"

          cp res/zenix.desktop "${D}/usr/share/applications/"
          cp res/zenix.png     "${D}/usr/share/icons/hicolor/512x512/apps/"
          cp assets/fonts/*.ttf   "${D}/usr/share/zenix/fonts/"
          cp assets/themes/*.json "${D}/usr/share/zenix/themes/"
          cp README.md "${D}/usr/share/doc/zenix/"
          test -f LICENSE && cp LICENSE "${D}/usr/share/doc/zenix/" || true

          INSTALLED_SIZE="$(du -sk "${D}" | cut -f1)"

          > "${D}/DEBIAN/control"
          echo "Package: zenix"                                 >> "${D}/DEBIAN/control"
          echo "Version: ${version}"                            >> "${D}/DEBIAN/control"
          echo "Maintainer: re2zero <yangwu@uniontech.com>"     >> "${D}/DEBIAN/control"
          echo "Description: A cross-platform GPUI frontend for herdr terminal workspace manager" >> "${D}/DEBIAN/control"
          echo " zenix is an extensible terminal workspace manager designed for AI coding agents." >> "${D}/DEBIAN/control"
          echo " It provides workspace, tab, and pane management with a client-server"            >> "${D}/DEBIAN/control"
          echo " architecture, plus system monitoring and plugin support."                         >> "${D}/DEBIAN/control"
          echo "Section: utils"                      >> "${D}/DEBIAN/control"
          echo "Priority: optional"                  >> "${D}/DEBIAN/control"
          echo "Architecture: amd64"                 >> "${D}/DEBIAN/control"
          echo "Installed-Size: ${INSTALLED_SIZE}"   >> "${D}/DEBIAN/control"
          echo "Depends: libxcb1, libxkbcommon0, libxkbcommon-x11-0, libfreetype6, libfontconfig1, libwayland-client0, libegl1, libgl1" >> "${D}/DEBIAN/control"

          dpkg-deb --build -Zgzip --root-owner-group \
            "zenix-deb/zenix_${version}_${suffix}_amd64" \
            "zenix_${version}_${suffix}_amd64.deb"

      - name: Build AppImage
        run: |
          version="${GITHUB_REF_NAME#v}"
          suffix="${{ matrix.suffix }}"
          BINDIR="target/release"
          APPDIR="zenix.AppDir"

          #linuxdeploy and plugin needs a Linux host — run inside the build container
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            -e APPIMAGE_EXTRACT_AND_RUN=1 \
            ${{ matrix.image }} \
            bash -e -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq || {
                sed -i "s|archive.ubuntu.com|old-releases.ubuntu.com|g" /etc/apt/sources.list
                sed -i "s|security.ubuntu.com|old-releases.ubuntu.com|g" /etc/apt/sources.list
                apt-get update -qq
              }
              apt-get install -y -qq --no-install-recommends \
                libxcb1 libxkbcommon0 libxkbcommon-x11-0 \
                libfontconfig1 libfreetype6 \
                libwayland-client0 libegl1 libgl1 \
                file curl ca-certificates

              ARCH=x86_64
              curl -L -o "linuxdeploy-${ARCH}.AppImage" \
                "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage"
              chmod +x "linuxdeploy-${ARCH}.AppImage"

              version="${GITHUB_REF_NAME#v}"
              suffix="${{ matrix.suffix }}"
              BINDIR="target/release"
              APPDIR="zenix.AppDir"

              mkdir -p "${APPDIR}/usr/bin" \
                       "${APPDIR}/usr/share/applications" \
                       "${APPDIR}/usr/share/icons/hicolor/512x512/apps" \
                       "${APPDIR}/usr/share/zenix/fonts" \
                       "${APPDIR}/usr/share/zenix/themes"

              cp "${BINDIR}/zenix" "${APPDIR}/usr/bin/"
              test -f "${BINDIR}/herdr" && cp "${BINDIR}/herdr" "${APPDIR}/usr/share/zenix/"
              cp res/zenix.desktop "${APPDIR}/usr/share/applications/"
              cp res/zenix.png     "${APPDIR}/usr/share/icons/hicolor/512x512/apps/"
              cp assets/fonts/*.ttf   "${APPDIR}/usr/share/zenix/fonts/"
              cp assets/themes/*.json "${APPDIR}/usr/share/zenix/themes/"

              cp res/zenix.png "${APPDIR}/zenix.png"

              OUTPUT="Zenix-${version}-${suffix}-x86_64.AppImage" \
                ./linuxdeploy-x86_64.AppImage \
                  --appdir "${APPDIR}" \
                  --output appimage \
                  --desktop-file res/zenix.desktop \
                  --icon-file res/zenix.png

              echo "=== AppImage built ==="
              ls -lh Zenix-*.AppImage
            '

      - name: Build .rpm package
        if: matrix.suffix == 'ubuntu24'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            fedora:latest \
            bash -e -c '
              dnf install -y -q rpm-build

              version="${GITHUB_REF_NAME#v}"
              mkdir -p /tmp/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

              # Build source tarball with only files that exist
              src_files="target/release/zenix"
              test -f target/release/herdr && src_files="$src_files target/release/herdr"
              src_files="$src_files res/zenix.desktop res/zenix.png"
              src_files="$src_files assets/fonts/ assets/themes/"
              test -f README.md && src_files="$src_files README.md"
              test -f LICENSE && src_files="$src_files LICENSE"

              tar czf /tmp/rpmbuild/SOURCES/zenix-${version}.tar.gz \
                --transform "s,^,zenix-${version}/," \
                $src_files

              echo "=== source tarball ==="
              ls -lh /tmp/rpmbuild/SOURCES/zenix-${version}.tar.gz

              # Replace hardcoded version in spec with tag version
              sed -i "s/^Version:.*/Version: ${version}/" installers/linux/zenix.spec

              rpmbuild -bb \
                --define "_topdir /tmp/rpmbuild" \
                --define "_rpmdir /workspace" \
                --define "_rpmfilename %%{NAME}-%%{VERSION}-%%{RELEASE}.%%{ARCH}.rpm" \
                installers/linux/zenix.spec

              echo "=== rpm built ==="
              ls -lh /workspace/zenix-*.rpm
            '

      - uses: actions/upload-artifact@v4
        with:
          name: zenix-linux-${{ matrix.suffix }}
          path: |
            zenix_*_*.deb
            Zenix-*.AppImage
            zenix-*.rpm

  # ═══════════════════════════════════════════════════════════════
  #  Arch Linux  — .pkg.tar.zst
  # ═══════════════════════════════════════════════════════════════
  archlinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and package inside Arch Linux container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            archlinux:latest \
            bash -e -c '
              pacman -Sy --noconfirm \
                base-devel rustup git zstd \
                libxcb libxkbcommon libxkbcommon-x11 \
                fontconfig \
                freetype2 expat wayland libglvnd

              # pacman zig may lag behind the required 0.15.2
              curl -L https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz \
                | tar -xJ -C /usr/local
              ln -s /usr/local/zig-x86_64-linux-0.15.2/zig /usr/local/bin/zig

              rustup default stable
              cargo build --release

              version="${GITHUB_REF_NAME#v}"
              P="pkgdest/zenix-${version}-1-x86_64"

              mkdir -p "${P}/usr/bin" \
                       "${P}/usr/share/applications" \
                       "${P}/usr/share/icons/hicolor/512x512/apps" \
                       "${P}/usr/share/doc/zenix" \
                       "${P}/usr/share/zenix/fonts" \
                       "${P}/usr/share/zenix/themes"

              cp target/release/zenix "${P}/usr/bin/"
              if [ -f target/release/herdr ]; then
                cp target/release/herdr "${P}/usr/share/zenix/"
              fi

              cp res/zenix.desktop "${P}/usr/share/applications/"
              cp res/zenix.png     "${P}/usr/share/icons/hicolor/512x512/apps/"
              cp assets/fonts/*.ttf   "${P}/usr/share/zenix/fonts/"
              cp assets/themes/*.json "${P}/usr/share/zenix/themes/"
              cp README.md "${P}/usr/share/doc/zenix/"
              if [ -f LICENSE ]; then
                cp LICENSE "${P}/usr/share/doc/zenix/"
              fi

              INSTALLED_SIZE="$(du -sk "${P}" | cut -f1)"

              # .PKGINFO
              > "${P}/.PKGINFO"
              echo "pkgname = zenix"                                   >> "${P}/.PKGINFO"
              echo "pkgbase = zenix"                                   >> "${P}/.PKGINFO"
              echo "pkgver = ${version}-1"                             >> "${P}/.PKGINFO"
              echo "pkgdesc = A cross-platform GPUI frontend for herdr terminal workspace manager" >> "${P}/.PKGINFO"
              echo "url = https://github.com/re2zero/zenix"            >> "${P}/.PKGINFO"
              echo "builddate = $(date +%s)"                           >> "${P}/.PKGINFO"
              echo "packager = GitHub Actions"                         >> "${P}/.PKGINFO"
              echo "size = $(( INSTALLED_SIZE * 1024 ))"               >> "${P}/.PKGINFO"
              echo "arch = x86_64"                                     >> "${P}/.PKGINFO"
              echo "license = GPL-3.0-or-later"                        >> "${P}/.PKGINFO"
              echo "depend = libxcb"                                   >> "${P}/.PKGINFO"
              echo "depend = libxkbcommon"                             >> "${P}/.PKGINFO"
              echo "depend = fontconfig"                               >> "${P}/.PKGINFO"
              echo "depend = freetype2"                                >> "${P}/.PKGINFO"
              echo "depend = wayland"                                  >> "${P}/.PKGINFO"
              echo "depend = libglvnd"                                 >> "${P}/.PKGINFO"

              # .INSTALL
              > "${P}/.INSTALL"
              echo "post_install() {"                                  >> "${P}/.INSTALL"
              echo "  update-desktop-database -q 2>/dev/null || true"   >> "${P}/.INSTALL"
              echo "  gtk-update-icon-cache -q -t /usr/share/icons/hicolor 2>/dev/null || true" >> "${P}/.INSTALL"
              echo "}"                                                 >> "${P}/.INSTALL"
              echo ""                                                  >> "${P}/.INSTALL"
              echo "post_upgrade() {"                                   >> "${P}/.INSTALL"
              echo "  post_install"                                     >> "${P}/.INSTALL"
              echo "}"                                                  >> "${P}/.INSTALL"
              echo ""                                                   >> "${P}/.INSTALL"
              echo "post_remove() {"                                    >> "${P}/.INSTALL"
              echo "  post_install"                                      >> "${P}/.INSTALL"
              echo "}"                                                   >> "${P}/.INSTALL"

              cd "$(dirname "${P}")"
              tar --zstd \
                -cf "/workspace/zenix-${version}-1-x86_64.pkg.tar.zst" \
                "zenix-${version}-1-x86_64/.PKGINFO" \
                "zenix-${version}-1-x86_64/.INSTALL" \
                "zenix-${version}-1-x86_64/usr"

              echo "=== package built ==="
              ls -lh "/workspace/zenix-${version}-1-x86_64.pkg.tar.zst"
            '

      - uses: actions/upload-artifact@v4
        with:
          name: zenix-archlinux
          path: zenix-*.pkg.tar.zst

  # ═══════════════════════════════════════════════════════════════
  #  Release  — collect all artifacts → GitHub Release
  # ═══════════════════════════════════════════════════════════════
  release:
    needs:
      - windows
      - macos-x86_64
      - macos-aarch64
      - linux
      - archlinux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find . -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.pkg.tar.zst' \
               -o -name '*.AppImage' -o -name '*.dmg' -o -name '*-setup.exe' \) \
            -exec cp {} release-assets/ \;
          echo "=== release assets ==="
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
